<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <!-- AFRAME -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- MINDAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:black;
      width:100vw;
      height:100vh;
      font-family:Arial,sans-serif;
    }

    canvas{
      display:block;
    }

    #loading{
      position:fixed;
      inset:0;
      background:black;
      z-index:9999;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:18px;
      transition:opacity .3s ease;
    }

    #loading.hide{
      opacity:0;
      pointer-events:none;
    }

    #tap{
      position:fixed;
      bottom:25px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,.6);
      color:white;
      padding:10px 18px;
      border-radius:12px;
      font-size:14px;
      z-index:999;
    }

    #tap.hide{
      display:none;
    }
  </style>
</head>

<body>

  <!-- LOADING -->
  <div id="loading">Loading AR...</div>

  <!-- AUDIO ENABLE -->
  <div id="tap">Tap once to enable audio</div>

  <a-scene

    embedded

    color-space="sRGB"

    renderer="
      colorManagement:true;
      physicallyCorrectLights:false;
      antialias:true;
      precision:mediump;
    "

    vr-mode-ui="enabled:false"
    device-orientation-permission-ui="enabled:false"

    mindar-image="
      imageTargetSrc: targets.mind;

      autoStart: true;

      uiLoading: no;
      uiScanning: yes;
      uiError: no;

      maxTrack: 1;

      filterMinCF: 0.001;
      filterBeta: 0.01;

      warmupTolerance: 0;
      missTolerance: 2;
    "
  >

    <!-- ASSETS -->
    <a-assets timeout="10000">

      <video
        id="video"

        src="video.mp4"

        preload="auto"

        crossorigin="anonymous"

        playsinline
        webkit-playsinline

        loop
      ></video>

    </a-assets>

    <!-- CAMERA -->
    <a-camera
      position="0 0 0"
      look-controls="enabled:false"
    ></a-camera>

    <!-- TARGET -->
    <a-entity
      id="target"
      mindar-image-target="targetIndex: 0"
    >

      <!-- VIDEO -->
      <a-video
        id="videoPlane"

        src="#video"

        width="1"
        height="1.5"

        position="0 0 0"

        material="
          shader:flat;
          transparent:true;
        "
      ></a-video>

    </a-entity>

  </a-scene>

  <script>

    const scene = document.querySelector("a-scene");

    const video = document.querySelector("#video");

    const target = document.querySelector("#target");

    const loading = document.querySelector("#loading");

    const tap = document.querySelector("#tap");

    let audioEnabled = false;

    let trackingStarted = false;

    // REMOVE LOADING
    scene.addEventListener("renderstart", () => {

      setTimeout(() => {

        loading.classList.add("hide");

      }, 300);

    });

    // ENABLE AUDIO
    async function unlockAudio(){

      if(audioEnabled) return;

      audioEnabled = true;

      video.muted = false;

      try{

        await video.play();

        video.pause();

      }catch(e){}

      tap.classList.add("hide");
    }

    document.body.addEventListener("click", unlockAudio);

    document.body.addEventListener("touchstart", unlockAudio);

    // VIDEO FIT
    video.addEventListener("loadedmetadata", () => {

      const plane = document.querySelector("#videoPlane");

      const vw = video.videoWidth;

      const vh = video.videoHeight;

      const ratio = vw / vh;

      // PORTRAIT
      if(ratio < 1){

        plane.setAttribute("width", "1");

        plane.setAttribute("height", 1 / ratio);

      }

      // LANDSCAPE
      else{

        plane.setAttribute("width", ratio);

        plane.setAttribute("height", "1");

      }

    });

    // TARGET FOUND
    target.addEventListener("targetFound", async () => {

      trackingStarted = true;

      try{

        if(audioEnabled){

          video.muted = false;

        }else{

          video.muted = true;

        }

        await video.play();

      }catch(e){}

    });

    // TARGET LOST
    target.addEventListener("targetLost", () => {

      trackingStarted = false;

      video.pause();

    });

    // FORCE VIDEO READY
    video.load();

    // IOS + ANDROID FIX
    window.addEventListener("load", async () => {

      try{

        video.muted = true;

        await video.play();

        video.pause();

      }catch(e){}

    });

  </script>

</body>

</html>
